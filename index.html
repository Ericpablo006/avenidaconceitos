<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avenida Conceito</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     TOKENS — preto e branco puro, sem cor de destaque
     ============================================================ */
  :root {
    --ink-0: #050505;
    --ink-1: #121212;
    --ink-2: #1c1c1c;
    --paper: #F3F2EE;
    --paper-dim: #8B8A85;
    --paper-faint: #58574F;
    --line: rgba(243,242,238,0.14);
    --line-strong: rgba(243,242,238,0.36);
    --hole: #0A0A0A;

    --font-display: 'Poppins', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  @font-face { font-family: 'Fraunces'; src: local('Fraunces'); }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: radial-gradient(circle at 50% -10%, var(--ink-2) 0%, var(--ink-1) 45%, var(--ink-0) 100%);
    font-family: var(--font-body);
    color: var(--paper);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* textura de linho sutil */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(243,242,238,0.025) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(243,242,238,0.02) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 0;
  }

  /* holofote seguindo o cursor */
  #spotlight {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(280px 280px at var(--mx, 50%) var(--my, 20%), rgba(243,242,238,0.06), transparent 70%);
    transition: opacity 0.3s ease;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 460px;
    margin: 0 auto;
    padding: 60px 20px 50px;
  }

  /* ---------- Etiqueta / crachá pendurado ---------- */
  .card {
    position: relative;
    text-align: center;
    padding-bottom: 4px;
    opacity: 0;
    transform: translateY(14px);
    animation: rise 0.7s cubic-bezier(.2,.7,.3,1) forwards;
  }

  .tag-rig {
    width: 148px;
    margin: 0 auto 22px;
    position: relative;
    height: 190px;
  }

  .tag-string {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: visible;
    pointer-events: none;
  }

  .tag-swing {
    position: absolute;
    top: 26px;
    left: 50%;
    width: 136px;
    height: 136px;
    transform-origin: 50% -18px;
    animation: swing 6.5s ease-in-out infinite;
    cursor: grab;
  }

  .tag-body {
    position: absolute;
    inset: 0;
    margin-left: -68px;
    border-radius: 50%;
    background: linear-gradient(150deg, var(--paper), #cfcec8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 34px;
    font-weight: 600;
    color: var(--ink-0);
    border: 3px solid var(--paper);
    box-shadow: 0 14px 30px rgba(0,0,0,0.55);
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(.2,.8,.3,1);
  }

  .tag-swing:hover .tag-body { transform: scale(1.05); }

  .tag-body img {
    width: 82%; height: 82%;
    object-fit: contain;
    background: #fff;
    border-radius: 50%;
  }

  .tag-hole {
    position: absolute;
    top: 4px;
    left: calc(50% - 6px);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--hole);
    border: 1px solid var(--line-strong);
    z-index: 2;
  }

  @keyframes swing {
    0%, 100% { transform: rotate(-4deg); }
    50% { transform: rotate(4deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .tag-swing { animation: none !important; }
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 27px;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
  }

  .tagline {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 14.5px;
    color: var(--paper-dim);
    margin: 0 0 12px;
    line-height: 1.5;
  }

  .meta-row {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--paper-dim);
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: transparent;
    border: 1.4px solid var(--paper-dim);
    flex-shrink: 0;
    transition: background 0.3s ease, border-color 0.3s ease;
  }
  .status-dot.open {
    background: var(--paper);
    border-color: var(--paper);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(243,242,238,0.4); }
    50% { box-shadow: 0 0 0 5px rgba(243,242,238,0); }
  }

  /* ---------- Costura (divisor) ---------- */
  .stitch-wrap {
    margin: 34px 0 22px;
    opacity: 0;
    animation: rise 0.6s ease forwards;
    animation-delay: 0.15s;
  }
  .stitch-wrap svg { width: 100%; height: 18px; display: block; }
  .stitch-line {
    stroke: var(--paper-dim);
    stroke-width: 1.6;
    stroke-dasharray: 7 6;
    fill: none;
    stroke-linecap: round;
    stroke-dashoffset: 400;
    animation: stitch-draw 1.4s ease forwards 0.3s;
  }
  @keyframes stitch-draw {
    to { stroke-dashoffset: 0; }
  }
  .stitch-label {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--paper-dim);
    margin-top: 6px;
  }

  /* ---------- Botões de link (vitrines) ---------- */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: rgba(243,242,238,0.05);
    background-image: radial-gradient(160px 90px at var(--hx, 50%) var(--hy, 50%), rgba(243,242,238,0.09), transparent 70%);
    border: 1px solid var(--line);
    border-radius: 4px;
    text-decoration: none;
    color: var(--paper);
    font-weight: 600;
    font-size: 15.5px;
    opacity: 0;
    transform: translateY(10px);
    animation: rise 0.55s ease forwards;
    transition: background-color 0.25s ease, border-color 0.25s ease, transform 0.15s ease;
    will-change: transform;
    overflow: hidden;
  }

  .link-btn:hover {
    background-color: rgba(243,242,238,0.09);
    border-color: var(--line-strong);
  }
  .link-btn:active { transform: scale(0.98) !important; }

  .link-btn:focus-visible {
    outline: 2px solid var(--paper);
    outline-offset: 2px;
  }

  .link-icon {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
    border-radius: 4px;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
  }
  .link-icon svg { width: 20px; height: 20px; }

  .link-btn:hover .link-icon { transform: rotate(-6deg) scale(1.06); }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(243,242,238,0.3);
    transform: scale(0);
    animation: ripple-anim 0.6s ease-out forwards;
    pointer-events: none;
  }
  @keyframes ripple-anim { to { transform: scale(1); opacity: 0; } }

  .link-text { flex: 1; min-width: 0; }
  .link-sub {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-dim);
    font-weight: 400;
    margin-top: 2px;
  }

  .link-arrow {
    font-family: var(--font-mono);
    color: var(--paper-dim);
    font-size: 16px;
    transition: transform 0.2s ease, color 0.2s ease;
  }
  .link-btn:hover .link-arrow { transform: translateX(3px); color: var(--paper); }

  .link-btn.whatsapp {
    background-color: rgba(243,242,238,0.1);
    border-color: var(--line-strong);
  }
  .link-btn.whatsapp .link-icon { background: var(--paper); }
  .link-btn.whatsapp:hover { background-color: rgba(243,242,238,0.15); }

  .copy-hint {
    position: absolute;
    top: 6px;
    right: 10px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--paper-dim);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .link-btn:hover .copy-hint { opacity: 0.7; }

  /* ---------- Rodapé ---------- */
  footer {
    text-align: center;
    margin-top: 38px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--paper-dim);
    opacity: 0.75;
    letter-spacing: 0.03em;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #clock { color: var(--paper-faint); }

  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    .card, .stitch-wrap, .link-btn, .stitch-line {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      stroke-dashoffset: 0 !important;
    }
  }

  @media (max-width: 380px) {
    h1 { font-size: 23px; }
    .wrap { padding: 44px 16px 40px; }
  }
</style>
</head>

</div>

/* ============================================================
   Render
   ============================================================ */
document.getElementById('brandName').textContent = CONFIG.brandName;
document.getElementById('brandTagline').textContent = CONFIG.tagline;
document.getElementById('statusText').textContent = CONFIG.hoursNote || CONFIG.locale;

const avatarEl = document.getElementById('avatar');
if (CONFIG.avatarImage) {
  avatarEl.innerHTML = `<img src="${CONFIG.avatarImage}" alt="${CONFIG.brandName}">`;
} else {
  avatarEl.textContent = CONFIG.avatarInitials;
}

const container = document.getElementById('linksContainer');
CONFIG.links.forEach((link, i) => {
  const a = document.createElement('a');
  a.href = link.url;
  a.target = "_blank";
  a.rel = "noopener noreferrer";
  a.className = "link-btn" + (link.type === "whatsapp" ? " whatsapp" : "");
  a.style.animationDelay = (0.25 + i * 0.08) + "s";
  a.innerHTML = `
    <span class="link-icon">${ICONS[link.type] || ICONS.link}</span>
    <span class="link-text">${link.label}${link.sub ? `<span class="link-sub">${link.sub}</span>` : ""}</span>
    <span class="link-arrow">→</span>
  `;

  // brilho seguindo o cursor dentro do botão
  a.addEventListener('pointermove', (e) => {
    const rect = a.getBoundingClientRect();
    a.style.setProperty('--hx', ((e.clientX - rect.left) / rect.width * 100) + '%');
    a.style.setProperty('--hy', ((e.clientY - rect.top) / rect.height * 100) + '%');
  });

  // efeito ripple ao clicar
  a.addEventListener('click', function (e) {
    const rect = a.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 1.6;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
    a.appendChild(ripple);
    setTimeout(() => ripple.remove(), 650);
  });

  container.appendChild(a);
});

/* ============================================================
   Holofote de fundo seguindo o cursor
   ============================================================ */
const spotlight = document.getElementById('spotlight');
window.addEventListener('pointermove', (e) => {
  spotlight.style.setProperty('--mx', e.clientX + 'px');
  spotlight.style.setProperty('--my', e.clientY + 'px');
});

/* ============================================================
   Etiqueta: balanço extra ao aproximar o cursor
   ============================================================ */
const tagSwing = document.getElementById('tagSwing');
tagSwing.addEventListener('pointermove', (e) => {
  const rect = tagSwing.getBoundingClientRect();
  const offsetX = (e.clientX - (rect.left + rect.width / 2)) / rect.width;
  tagSwing.style.transform = `rotate(${offsetX * 14}deg)`;
  tagSwing.style.animationPlayState = 'paused';
});
tagSwing.addEventListener('pointerleave', () => {
  tagSwing.style.transform = '';
  tagSwing.style.animationPlayState = 'running';
});

/* ============================================================
   Relógio local + status aberto/fechado (fuso da Bahia)
   ============================================================ */
const clockEl = document.getElementById('clock');
const dotEl = document.getElementById('statusDot');

function updateClock() {
  const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Bahia' }));
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  clockEl.textContent = `Agora em Ituberá · ${hh}:${mm}`;

  const day = now.getDay(); // 0 dom .. 6 sáb
  const hour = now.getHours();
  const isOpen = day >= 1 && day <= 6 && hour >= 9 && hour < 18;
  dotEl.classList.toggle('open', isOpen);
}
updateClock();
setInterval(updateClock, 30000);
</script>
